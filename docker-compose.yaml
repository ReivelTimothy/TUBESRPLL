services:
  db:
    image: postgres:15-alpine
    container_name: tubesrpll_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-reivel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-tubes_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - tubes_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reivel_user} -d ${DB_NAME:-tubes_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: tubesrpll_server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - PORT=5000
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tubes_network
    entrypoint: ["sh", "-c", "npx sequelize-cli db:migrate && npm run dev"]

  client:
    build: ./client
    container_name: tubesrpll_client
    ports:
      - "80:80" 
    volumes:
      - ./client:/app 
      - /app/node_modules 
    environment:
      - CHOKIDAR_USEPOLLING=true 
    networks:
      - tubes_network

networks:
  tubes_network:
    driver: bridge